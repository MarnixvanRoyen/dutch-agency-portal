<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ·World — Inloggen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0d0d0d] min-h-screen flex items-center justify-center font-sans">

  <div class="w-full max-w-sm px-8 py-10 bg-[#1e1e1e] rounded-2xl border border-[#2a2a2a] shadow-2xl">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-[#FFD100] text-2xl font-bold tracking-widest uppercase mb-1">DJ·World</div>
      <div class="text-gray-600 text-xs">Rob Boskamp BV — Beheerportaal</div>
    </div>

    <!-- Formulier -->
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-gray-400 text-xs mb-1.5 uppercase tracking-wider">E-mailadres</label>
        <input type="email" id="email" required autocomplete="email"
          class="w-full bg-[#0d0d0d] border border-[#2a2a2a] text-white rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-[#FFD100] transition-colors placeholder-gray-700"
          placeholder="jouw@email.nl">
      </div>
      <div>
        <label class="block text-gray-400 text-xs mb-1.5 uppercase tracking-wider">Wachtwoord</label>
        <input type="password" id="password" required autocomplete="current-password"
          class="w-full bg-[#0d0d0d] border border-[#2a2a2a] text-white rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-[#FFD100] transition-colors placeholder-gray-700"
          placeholder="••••••••">
      </div>

      <div id="errorMsg" class="hidden text-red-400 text-xs text-center py-1.5 bg-red-900/20 rounded-lg px-3"></div>

      <button type="submit" id="submitBtn"
        class="w-full bg-[#FFD100] hover:bg-[#c9aa00] text-black font-bold font-semibold rounded-lg px-4 py-3 text-sm transition-colors mt-1 disabled:opacity-50">
        Inloggen
      </button>
    </form>

    <div class="text-center mt-8 text-gray-700 text-xs">
      © 2025 DJ·World · Rob Boskamp BV
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://agurvyolmndhefsafboi.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFndXJ2eW9sbW5kaGVmc2FmYm9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MzQ1MzQsImV4cCI6MjA5NTIxMDUzNH0.ZS-btW-HhMj7E8fd-IjeRTkmD20Di2AAnzm1-UNhP24'
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    // Al ingelogd? Direct door naar dashboard
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html'
    })

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const errorMsg = document.getElementById('errorMsg')
      const btn      = document.getElementById('submitBtn')

      btn.disabled = true
      btn.textContent = 'Bezig...'
      errorMsg.classList.add('hidden')

      const { error } = await db.auth.signInWithPassword({ email, password })

      if (error) {
        errorMsg.textContent = 'Onjuiste inloggegevens. Probeer opnieuw.'
        errorMsg.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = 'Inloggen'
      } else {
        window.location.href = 'dashboard.html'
      }
    })
  </script>
</body>
</html>
