<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracks — DJ·World</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0d0d0d] text-white min-h-screen font-sans">

  <aside id="sidebar" class="w-52 bg-[#1e1e1e] border-r border-[#2a2a2a] fixed h-full z-40 top-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out"></aside>

  <main class="md:ml-52 p-4 pt-16 md:p-8 md:pt-8">

    <div class="flex items-center justify-between mb-4">
      <div>
        <h1 class="text-xl font-bold">Tracks</h1>
        <p class="text-gray-500 text-sm mt-0.5">Alle tracks — koppel artiesten en splits</p>
      </div>
      <button onclick="openModal()"
        class="flex items-center gap-2 bg-[#FFD100] hover:bg-[#c9aa00] text-black font-bold text-sm px-3 md:px-4 py-2.5 rounded-lg transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        <span class="hidden sm:inline">Track toevoegen</span>
        <span class="sm:hidden">Toevoegen</span>
      </button>
    </div>

    <!-- Zoek + filter -->
    <div class="flex flex-col sm:flex-row gap-3 mb-4">
      <input type="text" id="searchInput" placeholder="Zoek op titel of catalogusnummer..."
        class="bg-[#1e1e1e] border border-[#2a2a2a] text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-[#FFD100] transition-colors w-full sm:w-80 placeholder-gray-600"
        oninput="filterTable()">
      <select id="labelFilter"
        class="bg-[#1e1e1e] border border-[#2a2a2a] text-gray-400 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-[#FFD100] transition-colors w-full sm:w-auto"
        onchange="filterTable()">
        <option value="">Alle labels</option>
      </select>
      <button id="noTitleBtn" onclick="toggleNoTitle()"
        class="flex items-center gap-2 px-3 py-2.5 text-xs border border-[#2a2a2a] text-gray-500 hover:text-white rounded-lg transition-colors whitespace-nowrap">
        <span class="w-2 h-2 rounded-full bg-amber-400 inline-block"></span>
        Zonder naam
      </button>
      <button id="multiArtistBtn" onclick="toggleMultiArtist()"
        class="flex items-center gap-2 px-3 py-2.5 text-xs border border-[#2a2a2a] text-gray-500 hover:text-white rounded-lg transition-colors whitespace-nowrap">
        <span class="w-2 h-2 rounded-full bg-purple-400 inline-block"></span>
        Mogelijk meerdere artiesten
      </button>
      <button id="conflictBtn" onclick="toggleConflict()"
        class="flex items-center gap-2 px-3 py-2.5 text-xs border border-[#2a2a2a] text-gray-500 hover:text-white rounded-lg transition-colors whitespace-nowrap">
        <span class="w-2 h-2 rounded-full bg-red-400 inline-block"></span>
        Artiest conflict
      </button>
    </div>

    <!-- Tabel -->
    <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-[#2a2a2a] text-gray-500 text-xs uppercase">
            <th class="text-left px-5 py-3 font-medium">Track</th>
            <th class="text-left px-5 py-3 font-medium">CatalogNumber</th>
            <th class="text-left px-5 py-3 font-medium">Label</th>
            <th class="text-left px-5 py-3 font-medium">Artiesten</th>
            <th class="text-right px-5 py-3 font-medium">Streams</th>
            <th class="text-right px-5 py-3 font-medium">Downloads</th>
            <th class="text-right px-5 py-3 font-medium">Totaal</th>
            <th class="text-right px-5 py-3 font-medium">Acties</th>
          </tr>
        </thead>
        <tbody id="tracksTable">
          <tr><td colspan="8" class="px-5 py-6 text-gray-600 text-sm">Laden...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Paginering -->
    <div class="flex items-center justify-between mt-4 text-sm text-gray-500">
      <span id="pageInfo"></span>
      <div class="flex gap-2">
        <button id="prevBtn" onclick="prevPage()"
          class="px-3 py-1.5 bg-[#1e1e1e] border border-[#2a2a2a] rounded-lg hover:text-white transition-colors">← Vorige</button>
        <button id="nextBtn" onclick="nextPage()"
          class="px-3 py-1.5 bg-[#1e1e1e] border border-[#2a2a2a] rounded-lg hover:text-white transition-colors">Volgende →</button>
      </div>
    </div>

  </main>

  <!-- ── Track modal ──────────────────────────────────────────────── -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-start justify-center z-50 p-4 overflow-y-auto">
    <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-2xl p-6 w-full max-w-lg shadow-2xl my-8">
      <h2 id="modalTitle" class="text-white font-semibold text-base mb-5">Track toevoegen</h2>
      <form id="trackForm" class="space-y-4">
        <input type="hidden" id="trackId">

        <!-- Titel -->
        <div>
          <label class="block text-gray-400 text-xs mb-1.5 uppercase tracking-wider">Titel</label>
          <input type="text" id="trackTitle"
            class="w-full bg-[#0d0d0d] border border-[#2a2a2a] text-white rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-[#FFD100] transition-colors"
            placeholder="Leeg laten → ⚠️ onbekende track">
        </div>

        <!-- Release (autocomplete) -->
        <div>
          <label class="block text-gray-400 text-xs mb-1.5 uppercase tracking-wider">Release (CatalogNumber) *</label>
          <input type="hidden" id="trackReleaseId">
          <div class="relative">
            <input type="text" id="releaseSearch" autocomplete="off" spellcheck="false"
              class="w-full bg-[#0d0d0d] border border-[#2a2a2a] text-white rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-[#FFD100] transition-colors placeholder-gray-600"
              placeholder="Zoek catalogusnummer..."
              oninput="filterReleases()" onfocus="showReleaseDropdown()">
            <div id="releaseDropdown"
              class="hidden absolute top-full left-0 right-0 mt-1 bg-[#161616] border border-[#2a2a2a] rounded-lg shadow-2xl z-20 max-h-52 overflow-y-auto">
            </div>
          </div>
        </div>

        <!-- Artiesten & splits -->
        <div class="pt-2">
          <div class="flex items-center justify-between mb-3">
            <label class="text-gray-400 text-xs uppercase tracking-wider">Artiesten & Splits</label>
            <span id="splitTotal" class="text-xs font-semibold text-gray-500">Totaal: 0%</span>
          </div>
          <div id="splitRows" class="space-y-2 mb-2"></div>
          <button type="button" onclick="addSplitRow()"
            class="w-full py-2.5 border border-dashed border-[#2a2a2a] text-gray-500 hover:text-white hover:border-[#FFD100] rounded-lg text-xs transition-colors">
            + Artiest toevoegen
          </button>
        </div>

        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeModal()"
            class="flex-1 border border-[#2a2a2a] text-gray-400 hover:text-white rounded-lg py-3 text-sm transition-colors">
            Annuleren
          </button>
          <button type="submit"
            class="flex-1 bg-[#FFD100] hover:bg-[#c9aa00] text-black font-bold rounded-lg py-3 text-sm transition-colors">
            Opslaan
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    let allTracks      = []
    let allLabels      = []
    let allArtists     = []
    let allReleases    = []
    let royaltyByTrack = {}
    let filtered       = []
    let filterNoTitle      = false
    let filterMultiArtist  = false
    let filterConflict     = false
    let conflictTrackIds   = new Set()
    const MULTI_ARTIST_RE  = / & | and | feat\.?| vs\.? |, /i
    let currentPage    = 0
    const PAGE_SIZE    = 50

    async function loadPage() {
      const session = await initPage('tracks')
      if (!session) return
      await Promise.all([loadLabels(), loadArtists(), loadReleases(), loadRoyalties()])
      await loadTracks()
    }

    async function loadLabels() {
      const { data } = await db.from('labels').select('id, name').order('name')
      allLabels = data || []
      const filterSel = document.getElementById('labelFilter')
      allLabels.forEach(l => filterSel.add(new Option(l.name, l.id)))
    }

    async function loadArtists() {
      const { data } = await db.from('artists').select('id, name').order('name')
      allArtists = data || []
    }

    async function loadReleases() {
      let all = [], from = 0
      while (true) {
        const { data } = await db.from('releases')
          .select('id, catalog_number, label_id, labels(name)')
          .order('catalog_number')
          .range(from, from + 999)
        if (!data || data.length === 0) break
        all.push(...data)
        if (data.length < 1000) break
        from += 1000
      }
      allReleases = all
    }

    async function loadRoyalties() {
      const { data: lines } = await db.from('statement_lines').select('track_id, usage_type, nett_royalty, artist_name')
      royaltyByTrack = {}

      // Artiestnamen per track uit statement_lines (voor conflict-check)
      const stmtArtistsByTrack = {}  // track_id → Set van artiestnamen (lowercase)

      ;(lines || []).forEach(l => {
        if (!l.track_id) return
        if (!royaltyByTrack[l.track_id]) royaltyByTrack[l.track_id] = { total: 0, stream: 0, download: 0 }
        const amt = parseFloat(l.nett_royalty) || 0
        royaltyByTrack[l.track_id].total += amt
        if (l.usage_type === 'stream')   royaltyByTrack[l.track_id].stream   += amt
        if (l.usage_type === 'download') royaltyByTrack[l.track_id].download += amt

        // Artiesten verzamelen voor conflict-detectie
        if (l.artist_name) {
          if (!stmtArtistsByTrack[l.track_id]) stmtArtistsByTrack[l.track_id] = new Set()
          stmtArtistsByTrack[l.track_id].add(l.artist_name.toLowerCase().trim())
        }
      })

      // Conflict: track_artists koppeling ophalen en vergelijken
      const { data: tas } = await db.from('track_artists').select('track_id, artists(name)')
      const linkedArtistByTrack = {}  // track_id → artiestnaam lowercase
      ;(tas || []).forEach(ta => {
        if (ta.artists?.name) linkedArtistByTrack[ta.track_id] = ta.artists.name.toLowerCase().trim()
      })

      conflictTrackIds = new Set()
      Object.entries(stmtArtistsByTrack).forEach(([trackId, stmtNames]) => {
        const linked = linkedArtistByTrack[trackId]
        if (!linked) return
        // Conflict als statement artiesten niet overeenkomen met de gekoppelde artiest
        const match = [...stmtNames].some(n => n === linked || linked.includes(n) || n.includes(linked))
        if (!match) conflictTrackIds.add(trackId)
      })
    }

    async function loadTracks() {
      let all = [], from = 0
      while (true) {
        const { data } = await db
          .from('tracks')
          .select('id, title, release_id, releases(id, catalog_number, release_type, label_id, labels(name)), track_artists(split_percentage, artists(id, name))')
          .order('title')
          .range(from, from + 999)
        if (!data || data.length === 0) break
        all.push(...data)
        if (data.length < 1000) break
        from += 1000
      }
      allTracks = all
      filtered  = allTracks
      currentPage = 0
      renderTable()
    }

    function renderTable() {
      const tbody = document.getElementById('tracksTable')
      const start = currentPage * PAGE_SIZE
      const page  = filtered.slice(start, start + PAGE_SIZE)

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="px-5 py-6 text-gray-600 text-sm">Geen tracks gevonden.</td></tr>'
        document.getElementById('pageInfo').textContent = ''
        return
      }

      tbody.innerHTML = page.map(t => {
        const catalog      = t.releases?.catalog_number || '—'
        const label        = t.releases?.labels?.name   || '—'
        const isCompilation = t.releases?.release_type === 'compilation'
        const roy          = royaltyByTrack[t.id] || { total: 0, stream: 0, download: 0 }
        const noTitle      = !t.title
        const artists      = (t.track_artists || [])
          .sort((a, b) => b.split_percentage - a.split_percentage)
          .map(ta => `${ta.artists?.name || '?'} <span class="text-gray-600">${ta.split_percentage}%</span>`)
          .join(', ')

        return `
          <tr class="border-t border-[#2a2a2a] hover:bg-[#2a2a2a]/30 transition-colors">
            <td class="px-5 py-3 font-medium">
              <div class="flex items-center gap-2">
                <span class="${noTitle ? 'text-amber-400' : 'text-white'}">
                  ${noTitle ? `<span title="Geen tracknaam">⚠️ <span class="font-mono text-xs">${catalog}</span></span>` : t.title}
                </span>
                ${isCompilation ? `<span class="text-xs px-1.5 py-0.5 rounded bg-orange-400/15 text-orange-400 whitespace-nowrap">verzameling</span>` : ''}
              </div>
            </td>
            <td class="px-5 py-3 text-gray-500 text-xs font-mono">${catalog}</td>
            <td class="px-5 py-3 text-gray-500 text-xs">${label}</td>
            <td class="px-5 py-3 text-xs text-gray-400 max-w-[200px]">
              ${artists || '<span class="text-gray-600">—</span>'}
            </td>
            <td class="px-5 py-3 text-right text-xs ${roy.stream ? 'text-[#FFD100]' : 'text-gray-600'}">
              ${roy.stream ? fmt(roy.stream) : '—'}
            </td>
            <td class="px-5 py-3 text-right text-xs ${roy.download ? 'text-blue-400' : 'text-gray-600'}">
              ${roy.download ? fmt(roy.download) : '—'}
            </td>
            <td class="px-5 py-3 text-right text-xs font-semibold ${roy.total ? 'text-white' : 'text-gray-600'}">
              ${roy.total ? fmt(roy.total) : '—'}
            </td>
            <td class="px-5 py-3 text-right whitespace-nowrap">
              <button onclick='editTrack(${JSON.stringify(t)})' class="text-gray-500 hover:text-white text-xs mr-3 transition-colors">Bewerken</button>
              <button onclick="deleteTrack('${t.id}', '${(t.title || catalog).replace(/'/g, "\\'")}')" class="text-gray-500 hover:text-red-400 text-xs transition-colors">Verwijderen</button>
            </td>
          </tr>
        `
      }).join('')

      const total = filtered.length
      const end   = Math.min(start + PAGE_SIZE, total)
      document.getElementById('pageInfo').textContent = `${start + 1}–${end} van ${total} tracks`
      document.getElementById('prevBtn').disabled = currentPage === 0
      document.getElementById('nextBtn').disabled = end >= total
    }

    function toggleNoTitle() {
      filterNoTitle = !filterNoTitle
      const btn = document.getElementById('noTitleBtn')
      btn.className = filterNoTitle
        ? 'flex items-center gap-2 px-3 py-2.5 text-xs border border-amber-400 text-amber-400 rounded-lg transition-colors whitespace-nowrap'
        : 'flex items-center gap-2 px-3 py-2.5 text-xs border border-[#2a2a2a] text-gray-500 hover:text-white rounded-lg transition-colors whitespace-nowrap'
      filterTable()
    }

    function toggleMultiArtist() {
      filterMultiArtist = !filterMultiArtist
      const btn = document.getElementById('multiArtistBtn')
      btn.className = filterMultiArtist
        ? 'flex items-center gap-2 px-3 py-2.5 text-xs border border-purple-400 text-purple-400 rounded-lg transition-colors whitespace-nowrap'
        : 'flex items-center gap-2 px-3 py-2.5 text-xs border border-[#2a2a2a] text-gray-500 hover:text-white rounded-lg transition-colors whitespace-nowrap'
      filterTable()
    }

    function toggleConflict() {
      filterConflict = !filterConflict
      const btn = document.getElementById('conflictBtn')
      btn.className = filterConflict
        ? 'flex items-center gap-2 px-3 py-2.5 text-xs border border-red-400 text-red-400 rounded-lg transition-colors whitespace-nowrap'
        : 'flex items-center gap-2 px-3 py-2.5 text-xs border border-[#2a2a2a] text-gray-500 hover:text-white rounded-lg transition-colors whitespace-nowrap'
      filterTable()
    }

    function filterTable() {
      const q       = document.getElementById('searchInput').value.toLowerCase()
      const labelId = document.getElementById('labelFilter').value
      filtered = allTracks.filter(t => {
        const catalog     = t.releases?.catalog_number || ''
        const matchSearch = !q || (t.title || '').toLowerCase().includes(q) || catalog.toLowerCase().includes(q)
        const matchLabel  = !labelId || t.releases?.label_id === labelId
        const matchNoTitle     = !filterNoTitle || !t.title
        const artistNames      = (t.track_artists || []).map(ta => ta.artists?.name || '').join(' ')
        const matchMultiArtist = !filterMultiArtist || MULTI_ARTIST_RE.test(artistNames)
        const matchConflict    = !filterConflict || conflictTrackIds.has(t.id)
        return matchSearch && matchLabel && matchNoTitle && matchMultiArtist && matchConflict
      })
      currentPage = 0
      renderTable()
    }

    function prevPage() { if (currentPage > 0) { currentPage--; renderTable() } }
    function nextPage() { if ((currentPage + 1) * PAGE_SIZE < filtered.length) { currentPage++; renderTable() } }

    // ── Modal ────────────────────────────────────────────────────

    function openModal(track = null) {
      document.getElementById('trackId').value        = track?.id    || ''
      document.getElementById('trackTitle').value     = track?.title || ''
      document.getElementById('trackReleaseId').value = track?.release_id || ''
      document.getElementById('releaseSearch').value  = track?.releases?.catalog_number || ''
      document.getElementById('modalTitle').textContent = track ? 'Track bewerken' : 'Track toevoegen'

      buildSplitRows(track?.track_artists || [])
      document.getElementById('modal').classList.remove('hidden')
      setTimeout(() => document.getElementById('trackTitle').focus(), 50)
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden')
      document.getElementById('releaseDropdown').classList.add('hidden')
    }

    function editTrack(t) { openModal(t) }

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal()
    })

    // Release autocomplete
    function filterReleases() {
      document.getElementById('trackReleaseId').value = ''
      showReleaseDropdown()
    }

    function showReleaseDropdown() {
      const q  = (document.getElementById('releaseSearch').value || '').toLowerCase()
      const dd = document.getElementById('releaseDropdown')
      const matches = q
        ? allReleases.filter(r => r.catalog_number.toLowerCase().includes(q)).slice(0, 40)
        : allReleases.slice(0, 40)
      if (!matches.length) { dd.classList.add('hidden'); return }
      dd.classList.remove('hidden')
      dd.innerHTML = matches.map(r => {
        const label = r.labels?.name || ''
        const hl = q
          ? r.catalog_number.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'),
              '<span style="color:#FFD100;font-weight:600">$1</span>')
          : r.catalog_number
        return `<button type="button"
          onmousedown="selectRelease('${r.id}', '${r.catalog_number.replace(/'/g, "\\'")}'); event.preventDefault()"
          class="w-full text-left px-4 py-2.5 text-sm text-gray-300 hover:bg-[#2a2a2a] hover:text-white transition-colors">
          ${hl} <span class="text-gray-600 text-xs ml-1">${label}</span>
        </button>`
      }).join('')
    }

    function selectRelease(id, catalog) {
      document.getElementById('trackReleaseId').value = id
      document.getElementById('releaseSearch').value  = catalog
      document.getElementById('releaseDropdown').classList.add('hidden')
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('#releaseSearch, #releaseDropdown')) {
        document.getElementById('releaseDropdown').classList.add('hidden')
      }
    })

    // ── Splits ───────────────────────────────────────────────────

    function buildSplitRows(existingSplits) {
      const container = document.getElementById('splitRows')
      container.innerHTML = ''
      if (existingSplits.length === 0) { addSplitRow() } else {
        existingSplits.forEach(ta => addSplitRow(ta.artists?.id, ta.split_percentage))
      }
      updateSplitTotal()
    }

    function addSplitRow(artistId = '', pct = '') {
      const container = document.getElementById('splitRows')
      const div = document.createElement('div')
      div.className = 'flex gap-2 items-center split-row'
      const options = allArtists.map(a =>
        `<option value="${a.id}" ${a.id === artistId ? 'selected' : ''}>${a.name}</option>`
      ).join('')
      div.innerHTML = `
        <select class="flex-1 bg-[#0d0d0d] border border-[#2a2a2a] text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-[#FFD100] transition-colors artist-select" onchange="updateSplitTotal()">
          <option value="">— Artiest —</option>${options}
        </select>
        <div class="flex items-center gap-1 shrink-0">
          <input type="number" min="0" max="100" step="0.01" value="${pct !== '' ? pct : 100}"
            class="w-20 bg-[#0d0d0d] border border-[#2a2a2a] text-white rounded-lg px-3 py-2.5 text-sm text-right focus:outline-none focus:border-[#FFD100] transition-colors split-input"
            oninput="updateSplitTotal()">
          <span class="text-gray-500 text-xs">%</span>
        </div>
        <button type="button" onclick="removeSplitRow(this)"
          class="text-gray-600 hover:text-red-400 transition-colors text-lg leading-none shrink-0 px-1">×</button>
      `
      container.appendChild(div)
      updateSplitTotal()
    }

    function removeSplitRow(btn) { btn.closest('.split-row').remove(); updateSplitTotal() }

    function updateSplitTotal() {
      const inputs = document.querySelectorAll('.split-input')
      const total  = Array.from(inputs).reduce((s, i) => s + (parseFloat(i.value) || 0), 0)
      const el     = document.getElementById('splitTotal')
      el.textContent = `Totaal: ${total.toFixed(1)}%`
      const ok = Math.abs(total - 100) < 0.11 || inputs.length === 0
      el.className = `text-xs font-semibold ${ok ? 'text-green-400' : 'text-red-400'}`
    }

    function getSplitRows() {
      const rows = []
      document.querySelectorAll('.split-row').forEach(row => {
        const artistId = row.querySelector('.artist-select').value
        const pct      = parseFloat(row.querySelector('.split-input').value) || 0
        if (artistId) rows.push({ artist_id: artistId, split_percentage: pct })
      })
      return rows
    }

    // ── Opslaan ──────────────────────────────────────────────────

    document.getElementById('trackForm').addEventListener('submit', async e => {
      e.preventDefault()
      const id        = document.getElementById('trackId').value
      const releaseId = document.getElementById('trackReleaseId').value
      if (!releaseId) { showToast('Selecteer een release.', 'error'); return }

      const payload = {
        title:      document.getElementById('trackTitle').value.trim() || null,
        release_id: releaseId,
      }
      const splits = getSplitRows()
      let trackId = id, error

      if (id) {
        ;({ error } = await db.from('tracks').update(payload).eq('id', id))
      } else {
        const { data, error: e2 } = await db.from('tracks').insert(payload).select().single()
        error = e2; trackId = data?.id
      }

      if (error || !trackId) { showToast(error?.message || 'Er ging iets mis.', 'error'); return }

      await db.from('track_artists').delete().eq('track_id', trackId)
      if (splits.length) {
        const { error: splitErr } = await db.from('track_artists').insert(
          splits.map(s => ({ track_id: trackId, artist_id: s.artist_id, split_percentage: s.split_percentage }))
        )
        if (splitErr) showToast('Track opgeslagen, maar splits mislukt: ' + splitErr.message, 'error')
      }

      showToast(id ? 'Track bijgewerkt.' : 'Track toegevoegd.')
      closeModal()
      await loadRoyalties()
      await loadTracks()
    })

    // ── Verwijderen ──────────────────────────────────────────────

    async function deleteTrack(id, title) {
      if (!confirm(`Weet je zeker dat je "${title}" wilt verwijderen?`)) return
      const { error } = await db.from('tracks').delete().eq('id', id)
      if (error) { showToast('Kan niet verwijderen: ' + error.message, 'error'); return }
      showToast('Track verwijderd.')
      await loadRoyalties()
      await loadTracks()
    }

    loadPage()
  </script>
</body>
</html>
