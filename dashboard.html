<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — DJ·World</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0d0d0d] text-white min-h-screen font-sans">

  <aside id="sidebar" class="w-52 bg-[#1e1e1e] border-r border-[#2a2a2a] fixed h-full z-40 top-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out"></aside>

  <main class="md:ml-52 p-4 pt-16 md:p-8 md:pt-8 min-h-screen">

    <div class="mb-6">
      <h1 class="text-xl font-bold text-white">Dashboard</h1>
      <p class="text-gray-500 text-sm mt-0.5">Overzicht DJ·World</p>
    </div>

    <!-- Filters + type toggle -->
    <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl p-4 mb-6">
      <div class="flex flex-col gap-3">
        <!-- Type toggle -->
        <div class="flex items-center gap-2">
          <span class="text-gray-500 text-xs uppercase tracking-wider whitespace-nowrap">Type</span>
          <div class="flex gap-1">
            <button onclick="setTypeFilter('all')" id="typeBtnAll"
              class="type-btn px-3 py-1.5 rounded-lg text-xs font-medium transition-colors bg-[#FFD100] text-black font-bold">
              Alles
            </button>
            <button onclick="setTypeFilter('stream')" id="typeBtnStream"
              class="type-btn px-3 py-1.5 rounded-lg text-xs font-medium transition-colors text-gray-500 hover:text-white hover:bg-[#2a2a2a]">
              Streams
            </button>
            <button onclick="setTypeFilter('download')" id="typeBtnDownload"
              class="type-btn px-3 py-1.5 rounded-lg text-xs font-medium transition-colors text-gray-500 hover:text-white hover:bg-[#2a2a2a]">
              Downloads
            </button>
          </div>
        </div>
        <!-- Naam filters -->
        <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
          <span class="text-gray-500 text-xs uppercase tracking-wider whitespace-nowrap hidden sm:inline">Naam</span>
          <div id="wrap_label"  class="relative w-full sm:flex-1"></div>
          <div id="wrap_artist" class="relative w-full sm:flex-1"></div>
          <div id="wrap_track"  class="relative w-full sm:flex-1"></div>
          <button onclick="resetFilters()"
            class="w-full sm:w-auto text-gray-500 hover:text-white text-xs px-4 py-2.5 border border-[#2a2a2a] rounded-lg transition-colors whitespace-nowrap">
            Reset
          </button>
        </div>
      </div>
    </div>

    <!-- Stat cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-6">
      <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl p-5">
        <div class="text-gray-500 text-xs uppercase tracking-wider mb-2">Labels</div>
        <div id="statLabels" class="text-3xl font-bold">—</div>
      </div>
      <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl p-5">
        <div class="text-gray-500 text-xs uppercase tracking-wider mb-2">Artiesten</div>
        <div id="statArtists" class="text-3xl font-bold">—</div>
      </div>
      <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl p-5">
        <div class="text-gray-500 text-xs uppercase tracking-wider mb-2">Statements</div>
        <div id="statStatements" class="text-3xl font-bold">—</div>
      </div>
      <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl p-5">
        <div class="text-gray-500 text-xs uppercase tracking-wider mb-2">Bruto Royalties</div>
        <div id="statRoyalties" class="text-3xl font-bold text-[#FFD100]">—</div>
      </div>
    </div>

    <!-- Royalty flow kaart -->
    <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl p-5 mb-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-white font-semibold text-sm">Royalty verdeling</h2>
        <button onclick="toggleCommissieEdit()" id="commissieBtnEdit"
          class="text-gray-500 hover:text-white text-xs border border-[#2a2a2a] px-3 py-1.5 rounded-lg transition-colors">
          Aanpassen
        </button>
      </div>

      <!-- Visuele flow -->
      <div id="commissieFlow" class="grid grid-cols-3 gap-3 mb-1">
        <div class="text-center">
          <div class="text-gray-500 text-xs uppercase tracking-wider mb-1">Aggregator</div>
          <div id="flowAggregatorPct" class="text-2xl font-bold text-red-400">30%</div>
          <div id="flowAggregatorAmt" class="text-gray-600 text-xs mt-0.5">—</div>
        </div>
        <div class="text-center">
          <div class="text-gray-500 text-xs uppercase tracking-wider mb-1">DJ·World</div>
          <div id="flowDJWorldPct" class="text-2xl font-bold text-[#FFD100]">50%</div>
          <div id="flowDJWorldAmt" class="text-gray-600 text-xs mt-0.5">—</div>
        </div>
        <div class="text-center">
          <div class="text-gray-500 text-xs uppercase tracking-wider mb-1">Voor artiesten</div>
          <div id="flowArtistPct" class="text-2xl font-bold text-green-400">—%</div>
          <div id="flowArtistAmt" class="text-gray-600 text-xs mt-0.5">—</div>
        </div>
      </div>

      <!-- Progressiebalk -->
      <div class="h-2 rounded-full overflow-hidden flex mt-3" id="flowBar">
        <div id="barAggregator" class="h-2 bg-red-500/70 transition-all duration-500" style="width:30%"></div>
        <div id="barDJWorld"    class="h-2 bg-[#FFD100]/70 transition-all duration-500" style="width:35%"></div>
        <div id="barArtist"     class="h-2 bg-green-500/70 transition-all duration-500" style="width:35%"></div>
      </div>

      <!-- Edit paneel (verborgen) -->
      <div id="commissieEdit" class="hidden mt-5 pt-4 border-t border-[#2a2a2a]">
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-gray-400 text-xs mb-1.5 uppercase tracking-wider">Aggregator %</label>
            <input type="number" id="inputAggregator" min="0" max="100" step="0.1" value="30"
              class="w-full bg-[#0d0d0d] border border-[#2a2a2a] text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-[#FFD100] transition-colors"
              oninput="previewCommissie()">
          </div>
          <div>
            <label class="block text-gray-400 text-xs mb-1.5 uppercase tracking-wider">DJ·World %</label>
            <input type="number" id="inputDJWorld" min="0" max="100" step="0.1" value="50"
              class="w-full bg-[#0d0d0d] border border-[#2a2a2a] text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-[#FFD100] transition-colors"
              oninput="previewCommissie()">
          </div>
        </div>
        <div class="flex gap-3">
          <button onclick="toggleCommissieEdit()"
            class="flex-1 border border-[#2a2a2a] text-gray-400 hover:text-white rounded-lg py-2.5 text-sm transition-colors">
            Annuleren
          </button>
          <button onclick="opslaanCommissie()"
            class="flex-1 bg-[#FFD100] hover:bg-[#c9aa00] text-black font-bold rounded-lg py-2.5 text-sm transition-colors">
            Opslaan
          </button>
        </div>
      </div>
    </div>

    <!-- Streams vs Downloads kaart -->
    <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl p-5 mb-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-white font-semibold text-sm">Streams vs Downloads</h2>
        <span id="typeTotal" class="text-gray-500 text-xs"></span>
      </div>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div class="bg-[#0d0d0d] rounded-xl p-4 border border-[#2a2a2a]">
          <div class="flex items-center gap-2 mb-2">
            <div class="w-2 h-2 rounded-full bg-[#FFD100]"></div>
            <span class="text-gray-400 text-xs uppercase tracking-wider">Streams</span>
          </div>
          <div id="streamAmount" class="text-xl font-bold text-white">—</div>
          <div id="streamPct" class="text-gray-600 text-xs mt-0.5">—</div>
        </div>
        <div class="bg-[#0d0d0d] rounded-xl p-4 border border-[#2a2a2a]">
          <div class="flex items-center gap-2 mb-2">
            <div class="w-2 h-2 rounded-full bg-blue-400"></div>
            <span class="text-gray-400 text-xs uppercase tracking-wider">Downloads</span>
          </div>
          <div id="downloadAmount" class="text-xl font-bold text-white">—</div>
          <div id="downloadPct" class="text-gray-600 text-xs mt-0.5">—</div>
        </div>
      </div>
      <!-- Ratio balk -->
      <div class="h-2 bg-[#2a2a2a] rounded-full overflow-hidden">
        <div id="streamBar" class="h-2 bg-[#FFD100] rounded-full transition-all duration-500" style="width:50%"></div>
      </div>
    </div>

    <!-- 3 royalty blokken -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5">

      <!-- Per Label -->
      <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl flex flex-col">
        <div class="px-5 py-4 border-b border-[#2a2a2a] flex items-center justify-between">
          <h2 class="text-white font-semibold text-sm">Per Label</h2>
          <span id="labelTotal" class="text-[#FFD100] text-xs font-semibold"></span>
        </div>
        <div id="blockLabels" class="flex-1 overflow-y-auto max-h-96 p-4 space-y-1 text-sm text-gray-500">
          Laden...
        </div>
      </div>

      <!-- Per Artiest -->
      <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl flex flex-col">
        <div class="px-5 py-4 border-b border-[#2a2a2a] flex items-center justify-between">
          <h2 class="text-white font-semibold text-sm">Per Artiest</h2>
          <span id="artistTotal" class="text-[#FFD100] text-xs font-semibold"></span>
        </div>
        <div id="blockArtists" class="flex-1 overflow-y-auto max-h-96 p-4 space-y-1 text-sm text-gray-500">
          Laden...
        </div>
      </div>

      <!-- Per Track -->
      <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl flex flex-col">
        <div class="px-5 py-4 border-b border-[#2a2a2a] flex items-center justify-between">
          <h2 class="text-white font-semibold text-sm">Per Track</h2>
          <span id="trackTotal" class="text-[#FFD100] text-xs font-semibold"></span>
        </div>
        <div id="blockTracks" class="flex-1 overflow-y-auto max-h-96 p-4 space-y-1 text-sm text-gray-500">
          Laden...
        </div>
      </div>

    </div>

  </main>

  <script src="shared.js"></script>
  <script>
    let allLines        = []   // statement_lines
    let trackArtistMap  = {}   // { track_id: [{name, pct}] }
    let artistTrackIds  = {}   // { artist_name: Set<track_id> }
    let activeType      = 'all'

    const filterValues = { label: '', artist: '', track: '' }
    const filterOpts   = { label: [], artist: [], track: [] }

    async function loadDashboard() {
      const session = await initPage('dashboard')
      if (!session) return

      const [labelsR, artistsR, stmtsR] = await Promise.all([
        db.from('labels').select('id', { count: 'exact', head: true }),
        db.from('artists').select('id', { count: 'exact', head: true }),
        db.from('statements').select('id', { count: 'exact', head: true }),
      ])
      document.getElementById('statLabels').textContent     = labelsR.count ?? 0
      document.getElementById('statArtists').textContent    = artistsR.count ?? 0
      document.getElementById('statStatements').textContent = stmtsR.count ?? 0

      // Statement lines — alle rijen ophalen (Supabase limiet omzeilen via paginering)
      allLines = []
      const pageSize = 1000
      let from = 0
      while (true) {
        const { data: page, error: pageErr } = await db
          .from('statement_lines')
          .select('track_id, label_name, track_title, nett_royalty, usage_type')
          .range(from, from + pageSize - 1)
        if (pageErr || !page || page.length === 0) break
        allLines.push(...page)
        if (page.length < pageSize) break
        from += pageSize
      }

      // Track_artists — voor artiestenverdeling via splits
      const { data: tas } = await db
        .from('track_artists')
        .select('track_id, split_percentage, artists(name)')
      trackArtistMap = {}
      artistTrackIds = {}
      ;(tas || []).forEach(ta => {
        const name = ta.artists?.name
        if (!name) return
        if (!trackArtistMap[ta.track_id]) trackArtistMap[ta.track_id] = []
        trackArtistMap[ta.track_id].push({ name, pct: parseFloat(ta.split_percentage) / 100 })
        if (!artistTrackIds[name]) artistTrackIds[name] = new Set()
        artistTrackIds[name].add(ta.track_id)
      })

      const total = allLines.reduce((s, l) => s + (parseFloat(l.nett_royalty) || 0), 0)
      document.getElementById('statRoyalties').textContent = fmt(total)

      updateFlowCard(total)
      updateTypeCard(allLines)
      populateDropdowns()
      renderBlocks(allLines)
    }

    // ── Autocomplete bouwen ──────────────────────────────────────────────

    function populateDropdowns() {
      filterOpts.label  = [...new Set(allLines.map(l => l.label_name).filter(Boolean))].sort()
      filterOpts.artist = Object.keys(artistTrackIds).sort()  // alleen artiesten die in het systeem staan
      filterOpts.track  = [...new Set(allLines.map(l => l.track_title).filter(Boolean))].sort()

      buildAutocomplete('wrap_label',  'label',  'Label zoeken...')
      buildAutocomplete('wrap_artist', 'artist', 'Artiest zoeken...')
      buildAutocomplete('wrap_track',  'track',  'Track zoeken...')
    }

    function buildAutocomplete(wrapperId, key, placeholder) {
      const wrap = document.getElementById(wrapperId)
      wrap.innerHTML = `
        <input type="text" id="input_${key}"
          placeholder="${placeholder}" autocomplete="off" spellcheck="false"
          class="w-full bg-[#0d0d0d] border border-[#2a2a2a] text-gray-300 rounded-lg px-3 py-2.5 pr-8 text-sm focus:outline-none focus:border-[#FFD100] transition-colors placeholder-gray-600"
          oninput="onFilterInput('${key}')"
          onfocus="showDropdown('${key}')">
        <button id="clear_${key}" onclick="clearFilter('${key}')"
          class="hidden absolute right-2 top-1/2 -translate-y-1/2 text-gray-600 hover:text-gray-300 transition-colors p-0.5">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
        <div id="dd_${key}"
          class="hidden absolute top-full left-0 right-0 mt-1 bg-[#161616] border border-[#2a2a2a] rounded-lg shadow-2xl z-20 max-h-52 overflow-y-auto">
        </div>
      `
    }

    // Terwijl de gebruiker tikt
    function onFilterInput(key) {
      const q = document.getElementById(`input_${key}`).value
      filterValues[key] = q
      document.getElementById(`clear_${key}`).classList.toggle('hidden', !q)
      showDropdown(key)
      applyFilters()
    }

    // Dropdown vullen met gefilterde opties
    function showDropdown(key) {
      const q    = (document.getElementById(`input_${key}`)?.value || '').toLowerCase()
      const opts = filterOpts[key] || []
      const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
      const matches = q ? opts.filter(o => o.toLowerCase().includes(q)) : opts
      const dd = document.getElementById(`dd_${key}`)
      if (!matches.length) { dd.classList.add('hidden'); return }

      dd.classList.remove('hidden')
      dd.innerHTML = matches.slice(0, 40).map(o => {
        const hl = escaped
          ? o.replace(new RegExp(`(${escaped})`, 'gi'),
              '<span style="color:#FFD100;font-weight:600">$1</span>')
          : o
        const safeVal = o.replace(/\\/g, '\\\\').replace(/'/g, "\\'")
        return `<button type="button"
          onmousedown="selectFilter('${key}', '${safeVal}'); event.preventDefault()"
          class="w-full text-left px-4 py-2.5 text-sm text-gray-300 hover:bg-[#2a2a2a] hover:text-white transition-colors">${hl}</button>`
      }).join('')
    }

    // Optie geselecteerd uit dropdown
    function selectFilter(key, value) {
      filterValues[key] = value
      document.getElementById(`input_${key}`).value = value
      document.getElementById(`clear_${key}`).classList.remove('hidden')
      document.getElementById(`dd_${key}`).classList.add('hidden')
      applyFilters()
    }

    // Filter wissen met kruisje
    function clearFilter(key) {
      filterValues[key] = ''
      document.getElementById(`input_${key}`).value = ''
      document.getElementById(`clear_${key}`).classList.add('hidden')
      document.getElementById(`dd_${key}`).classList.add('hidden')
      applyFilters()
    }

    // Sluit alle dropdowns bij klik buiten filterblok
    document.addEventListener('click', e => {
      if (!e.target.closest('#wrap_label, #wrap_artist, #wrap_track')) {
        ;['label', 'artist', 'track'].forEach(k => {
          const dd = document.getElementById(`dd_${k}`)
          if (dd) dd.classList.add('hidden')
        })
      }
    })

    // ── Royalty flow kaart ───────────────────────────────────────────────

    function updateFlowCard(bruto) {
      const aPct  = COMMISSIONS.aggregatorPct
      const dPct  = COMMISSIONS.djworldPct
      const aAmt  = bruto * aPct / 100
      const rest1 = bruto - aAmt
      const dAmt  = rest1 * dPct / 100
      const artAmt = rest1 - dAmt
      const artPct = bruto > 0 ? (artAmt / bruto * 100) : 0

      const djWorldPctOfTotal = bruto > 0 ? (dAmt / bruto * 100) : (100 - aPct) * dPct / 100
      document.getElementById('flowAggregatorPct').textContent = aPct + '%'
      document.getElementById('flowDJWorldPct').textContent    = djWorldPctOfTotal.toFixed(1) + '%'
      document.getElementById('flowArtistPct').textContent     = artPct.toFixed(1) + '%'
      document.getElementById('flowAggregatorAmt').textContent = fmt(aAmt)
      document.getElementById('flowDJWorldAmt').textContent    = fmt(dAmt)
      document.getElementById('flowArtistAmt').textContent     = fmt(artAmt)

      document.getElementById('barAggregator').style.width = aPct + '%'
      document.getElementById('barDJWorld').style.width    = (100 - aPct) * dPct / 100 + '%'
      document.getElementById('barArtist').style.width     = artPct + '%'

      // Inputs synchroniseren
      document.getElementById('inputAggregator').value = aPct
      document.getElementById('inputDJWorld').value    = dPct
    }

    function toggleCommissieEdit() {
      const el = document.getElementById('commissieEdit')
      el.classList.toggle('hidden')
    }

    function previewCommissie() {
      // Live preview in de flow kaart terwijl je tikt
      const aPct = parseFloat(document.getElementById('inputAggregator').value) || 0
      const dPct = parseFloat(document.getElementById('inputDJWorld').value) || 0
      const rest1  = 100 - aPct
      const djPctOfTotal = rest1 * dPct / 100
      const artPct = rest1 - djPctOfTotal
      document.getElementById('flowAggregatorPct').textContent = aPct + '%'
      document.getElementById('flowDJWorldPct').textContent    = djPctOfTotal.toFixed(1) + '%'
      document.getElementById('flowArtistPct').textContent     = artPct.toFixed(1) + '%'
      document.getElementById('barAggregator').style.width = aPct + '%'
      document.getElementById('barDJWorld').style.width    = (rest1 * dPct / 100) + '%'
      document.getElementById('barArtist').style.width     = artPct + '%'
    }

    async function opslaanCommissie() {
      const aPct = parseFloat(document.getElementById('inputAggregator').value) || 0
      const dPct = parseFloat(document.getElementById('inputDJWorld').value) || 0
      await saveSettings(aPct, dPct)
      toggleCommissieEdit()
      // Herlaad dashboard met nieuwe percentages
      const bruto = allLines.reduce((s, l) => s + (parseFloat(l.nett_royalty) || 0), 0)
      updateFlowCard(bruto)
      showToast('Commissies opgeslagen.')
    }

    // ── Streams vs Downloads kaart ───────────────────────────────────────

    function updateTypeCard(lines) {
      const streamTotal   = lines.filter(l => l.usage_type === 'stream')
        .reduce((s, l) => s + (parseFloat(l.nett_royalty) || 0), 0)
      const downloadTotal = lines.filter(l => l.usage_type === 'download')
        .reduce((s, l) => s + (parseFloat(l.nett_royalty) || 0), 0)
      const grand = streamTotal + downloadTotal

      document.getElementById('streamAmount').textContent   = fmt(streamTotal)
      document.getElementById('downloadAmount').textContent = fmt(downloadTotal)
      document.getElementById('typeTotal').textContent      = grand > 0 ? fmt(grand) + ' totaal' : ''

      if (grand > 0) {
        const pctStream   = (streamTotal / grand * 100).toFixed(1)
        const pctDownload = (downloadTotal / grand * 100).toFixed(1)
        document.getElementById('streamPct').textContent   = pctStream + '% van totaal'
        document.getElementById('downloadPct').textContent = pctDownload + '% van totaal'
        document.getElementById('streamBar').style.width  = pctStream + '%'
      }
    }

    // ── Type toggle (Alles / Streams / Downloads) ─────────────────────

    function setTypeFilter(type) {
      activeType = type
      // Knop-stijlen wisselen
      ;['all','stream','download'].forEach(t => {
        const btn = document.getElementById(`typeBtn${t.charAt(0).toUpperCase() + t.slice(1)}`)
        if (!btn) return
        if (t === type) {
          btn.className = 'type-btn px-3 py-1.5 rounded-lg text-xs font-medium transition-colors bg-[#FFD100] text-black font-bold'
        } else {
          btn.className = 'type-btn px-3 py-1.5 rounded-lg text-xs font-medium transition-colors text-gray-500 hover:text-white hover:bg-[#2a2a2a]'
        }
      })
      applyFilters()
    }

    // ── Filter toepassen ─────────────────────────────────────────────────

    function applyFilters() {
      const lq = filterValues.label.toLowerCase()
      const aq = filterValues.artist.toLowerCase()
      const tq = filterValues.track.toLowerCase()

      // Artist filter: filter op track_ids waar artiest aan gekoppeld is
      const artistTrackSet = aq
        ? (Object.entries(artistTrackIds).find(([n]) => n.toLowerCase().includes(aq))?.[1] || new Set())
        : null

      const filtered = allLines.filter(l => {
        const matchType   = activeType === 'all' || l.usage_type === activeType
        const matchLabel  = !lq || (l.label_name  || '').toLowerCase().includes(lq)
        const matchTrack  = !tq || (l.track_title || '').toLowerCase().includes(tq)
        const matchArtist = !aq || (artistTrackSet && l.track_id && artistTrackSet.has(l.track_id))
        return matchType && matchLabel && matchTrack && matchArtist
      })

      const filteredTotal = filtered.reduce((s, l) => s + (parseFloat(l.nett_royalty) || 0), 0)
      updateFlowCard(filteredTotal)
      updateTypeCard(filtered)
      renderBlocks(filtered)
    }

    function resetFilters() {
      activeType = 'all'
      setTypeFilter('all')
      ;['label', 'artist', 'track'].forEach(clearFilter)
    }

    // ── Blokken renderen ─────────────────────────────────────────────────

    function renderBlocks(lines) {
      // Per Label — bruto royalties op label_name
      const byLabel = {}
      lines.forEach(l => {
        const k = l.label_name; if (!k) return
        byLabel[k] = (byLabel[k] || 0) + (parseFloat(l.nett_royalty) || 0)
      })

      // Per Track — bruto royalties op track_title
      const byTrack = {}
      lines.forEach(l => {
        const k = l.track_title; if (!k) return
        byTrack[k] = (byTrack[k] || 0) + (parseFloat(l.nett_royalty) || 0)
      })

      // Per Artiest — via track_artists splits × netFactor()
      // Alleen voor regels die aan een track gekoppeld zijn
      const byArtist = {}
      lines.forEach(l => {
        if (!l.track_id) return
        const splits = trackArtistMap[l.track_id]
        if (!splits) return
        const bruto = parseFloat(l.nett_royalty) || 0
        splits.forEach(({ name, pct }) => {
          byArtist[name] = (byArtist[name] || 0) + bruto * netFactor() * pct
        })
      })

      const toEntries = obj => Object.entries(obj).sort((a, b) => b[1] - a[1])

      renderBlock('blockLabels',  'labelTotal',  toEntries(byLabel),  12)
      renderBlock('blockArtists', 'artistTotal', toEntries(byArtist), 12)
      renderBlock('blockTracks',  'trackTotal',  toEntries(byTrack),  12)
    }

    function renderBlock(blockId, totalId, entries, topN) {
      const el      = document.getElementById(blockId)
      const totalEl = document.getElementById(totalId)
      const total   = entries.reduce((s, [, v]) => s + v, 0)

      totalEl.textContent = fmt(total)

      if (!entries.length) {
        el.innerHTML = '<p class="text-gray-600 text-sm">Geen data.</p>'
        return
      }

      const top = entries.slice(0, topN)
      const max = top[0][1]

      el.innerHTML = top.map(([name, val]) => `
        <div class="mb-2.5">
          <div class="flex justify-between items-baseline mb-1">
            <span class="text-white text-xs truncate max-w-[60%]" title="${name}">${name}</span>
            <span class="text-[#FFD100] text-xs font-semibold ml-1 whitespace-nowrap">${fmt(val)}</span>
          </div>
          <div class="h-1 bg-[#2a2a2a] rounded-full">
            <div class="h-1 bg-[#FFD100] rounded-full" style="width:${Math.max(2, val / max * 100).toFixed(1)}%"></div>
          </div>
        </div>
      `).join('')

      if (entries.length > topN) {
        el.innerHTML += `<p class="text-gray-600 text-xs mt-2">+ ${entries.length - topN} meer</p>`
      }
    }

    loadDashboard()
  </script>
</body>
</html>
