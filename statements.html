<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statements — DJ·World</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-[#0d0d0d] text-white min-h-screen font-sans">

  <aside id="sidebar" class="w-52 bg-[#1e1e1e] border-r border-[#2a2a2a] fixed h-full z-40 top-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out"></aside>

  <main class="md:ml-52 p-4 pt-16 md:p-8 md:pt-8">

    <div class="mb-7">
      <h1 class="text-xl font-bold">Royalty Statements</h1>
      <p class="text-gray-500 text-sm mt-0.5">Upload Excel-bestanden (24 sheets per label)</p>
    </div>

    <!-- Upload sectie -->
    <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl p-6 mb-6">
      <h2 class="text-white font-semibold text-sm mb-4">Nieuw statement uploaden</h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-gray-400 text-xs mb-1.5 uppercase tracking-wider">Periode (bijv. Q1 2025)</label>
          <input type="text" id="period"
            class="w-full bg-[#0d0d0d] border border-[#2a2a2a] text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-[#FFD100] transition-colors"
            placeholder="Q1 2025">
        </div>
        <div>
          <label class="block text-gray-400 text-xs mb-1.5 uppercase tracking-wider">Excel bestand</label>
          <input type="file" id="fileInput" accept=".xlsx,.xls"
            class="w-full bg-[#0d0d0d] border border-[#2a2a2a] text-gray-400 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-[#FFD100] transition-colors file:mr-3 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-xs file:bg-[#FFD100] file:text-white file:font-medium hover:file:bg-[#c9aa00] file:cursor-pointer cursor-pointer">
        </div>
      </div>

      <!-- Progress -->
      <div id="uploadProgress" class="hidden mb-4">
        <div class="flex justify-between text-xs text-gray-500 mb-1">
          <span id="progressLabel">Verwerken...</span>
          <span id="progressPct">0%</span>
        </div>
        <div class="h-2 bg-[#2a2a2a] rounded-full overflow-hidden">
          <div id="progressBar" class="h-2 bg-[#FFD100] rounded-full transition-all duration-300" style="width:0%"></div>
        </div>
      </div>

      <!-- Preview na parse -->
      <div id="parsePreview" class="hidden mb-4 p-4 bg-[#0d0d0d] border border-[#2a2a2a] rounded-lg text-sm">
        <div id="previewContent"></div>
      </div>

      <div class="flex flex-col sm:flex-row gap-3">
        <button onclick="parseFile()" id="parseBtn"
          class="bg-[#2a2a2a] hover:bg-[#333] text-white text-sm font-medium px-5 py-2.5 rounded-lg transition-colors">
          Controleren
        </button>
        <button onclick="uploadStatement()" id="uploadBtn" disabled
          class="bg-[#FFD100] hover:bg-[#c9aa00] text-black font-bold text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
          Opslaan in database
        </button>
      </div>
    </div>

    <!-- Overzicht van statements -->
    <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl overflow-x-auto">
      <div class="px-5 py-4 border-b border-[#2a2a2a]">
        <h2 class="text-white font-semibold text-sm">Geüploade Statements</h2>
      </div>
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-[#2a2a2a] text-gray-500 text-xs uppercase">
            <th class="text-left px-5 py-3 font-medium">Bestandsnaam</th>
            <th class="text-left px-5 py-3 font-medium">Periode</th>
            <th class="text-right px-5 py-3 font-medium">Regels</th>
            <th class="text-right px-5 py-3 font-medium">Totaal Royalties</th>
            <th class="text-right px-5 py-3 font-medium">Geüpload</th>
            <th class="text-right px-5 py-3 font-medium">Actie</th>
          </tr>
        </thead>
        <tbody id="statementsTable">
          <tr><td colspan="6" class="px-5 py-6 text-gray-600 text-sm">Laden...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Detail modal -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
      <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-2xl w-full max-w-4xl max-h-[80vh] flex flex-col shadow-2xl">
        <div class="flex items-center justify-between px-6 py-4 border-b border-[#2a2a2a]">
          <h2 id="detailTitle" class="text-white font-semibold text-base"></h2>
          <button onclick="closeDetail()" class="text-gray-500 hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="overflow-auto flex-1 p-1">
          <table class="w-full text-xs">
            <thead class="sticky top-0 bg-[#1e1e1e]">
              <tr class="border-b border-[#2a2a2a] text-gray-500 uppercase">
                <th class="text-left px-4 py-3 font-medium">Label</th>
                <th class="text-left px-4 py-3 font-medium">Artiest</th>
                <th class="text-left px-4 py-3 font-medium">Track</th>
                <th class="text-left px-4 py-3 font-medium">ISRC</th>
                <th class="text-right px-4 py-3 font-medium">Royalty</th>
              </tr>
            </thead>
            <tbody id="detailTable"></tbody>
          </table>
        </div>
      </div>
    </div>

  </main>

  <script src="shared.js"></script>
  <script>
    let parsedData = null
    // catalogMap: { 'bbr184-12': { release_id, tracks: [{id, titleLower}] } }
    let catalogMap  = {}
    let knownArtists = new Set()  // alle bekende artiestnamen uit DB

    async function loadPage() {
      const session = await initPage('statements')
      if (!session) return
      await loadTrackMap()
      await loadStatements()
    }

    // Laad releases + tracks — match op CatalogNumber → release, dan op titel → track
    async function loadTrackMap() {
      // Haal alle releases op
      let releases = [], from = 0
      while (true) {
        const { data } = await db.from('releases').select('id, catalog_number').range(from, from + 999)
        if (!data || data.length === 0) break
        releases.push(...data)
        if (data.length < 1000) break
        from += 1000
      }
      // Haal alle tracks op
      let tracks = []
      from = 0
      while (true) {
        const { data } = await db.from('tracks').select('id, title, release_id').range(from, from + 999)
        if (!data || data.length === 0) break
        tracks.push(...data)
        if (data.length < 1000) break
        from += 1000
      }
      // Bouw catalogMap
      catalogMap = {}
      releases.forEach(r => {
        catalogMap[r.catalog_number.toLowerCase()] = { release_id: r.id, tracks: [] }
      })
      tracks.forEach(t => {
        const entry = Object.values(catalogMap).find(e => e.release_id === t.release_id)
        if (entry) entry.tracks.push({ id: t.id, titleLower: (t.title || '').toLowerCase() })
      })

      // Artiesten laden voor detectie
      const { data: artists } = await db.from('artists').select('name')
      knownArtists = new Set((artists || []).map(a => a.name))
    }

    async function loadStatements() {
      const { data, error } = await db
        .from('statements')
        .select('*')
        .order('uploaded_at', { ascending: false })

      const tbody = document.getElementById('statementsTable')
      if (!data?.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="px-5 py-6 text-gray-600 text-sm">Nog geen statements geüpload.</td></tr>'
        return
      }

      tbody.innerHTML = data.map(s => `
        <tr class="border-t border-[#2a2a2a] hover:bg-[#2a2a2a]/30 transition-colors">
          <td class="px-5 py-3.5 text-white font-medium">${s.filename}</td>
          <td class="px-5 py-3.5 text-gray-500">${s.period || '—'}</td>
          <td class="px-5 py-3.5 text-right text-gray-400">${s.line_count || 0}</td>
          <td class="px-5 py-3.5 text-right text-[#FFD100] font-semibold">${fmt(s.total_royalties)}</td>
          <td class="px-5 py-3.5 text-right text-gray-500 text-xs">${fmtDate(s.uploaded_at)}</td>
          <td class="px-5 py-3.5 text-right">
            <button onclick="viewDetail('${s.id}', '${s.filename.replace(/'/g, "\\'")}')"
              class="text-gray-500 hover:text-white text-xs mr-3 transition-colors">Bekijken</button>
            <button onclick="deleteStatement('${s.id}')"
              class="text-gray-500 hover:text-red-400 text-xs transition-colors">Verwijderen</button>
          </td>
        </tr>
      `).join('')
    }

    // ---------- Excel parsen ----------
    function detectCols(headers) {
      const h = headers.map(x => String(x || '').toLowerCase().trim())
      return {
        artist:   h.findIndex(x => x.includes('artist') || x.includes('artiest') || x.includes('performer') || x.includes('uitvoerder')),
        track:    h.findIndex(x => x === 'trackname' || x.includes('track') || x.includes('titel') || x.includes('title') || x.includes('song') || x.includes('werk')),
        isrc:     h.findIndex(x => x.includes('isrc') || x === 'catalognumber' || x.includes('catalog')),
        royalty:  h.findIndex(x => x.includes('royalt') || x.includes('bedrag') || x.includes('nett') || x.includes('amount') || x.includes('net ') || x === 'net'),
        period:   h.findIndex(x => x.includes('period') || x.includes('kwartaal') || x.includes('quarter')),
        type:     h.findIndex(x => x === 'deliverytype' || x.includes('delivery') || x === 'type' || x.includes('usagetype') || x.includes('transaction')),
        quantity: h.findIndex(x => x === 'quantity' || x.includes('aantal') || x === 'qty' || x.includes('count')),
      }
    }

    async function parseFile() {
      const file = document.getElementById('fileInput').files[0]
      if (!file) { showToast('Selecteer eerst een Excel-bestand.', 'error'); return }

      setProgress(true, 'Bestand lezen...', 5)

      const buffer = await file.arrayBuffer()
      const wb     = XLSX.read(buffer, { type: 'array' })

      const allLines = []
      const sheetNames = wb.SheetNames
      let totalRoyalties = 0

      sheetNames.forEach((sheetName, idx) => {
        setProgress(true, `Sheet ${idx + 1}/${sheetNames.length}: ${sheetName}`, 5 + Math.round(idx / sheetNames.length * 85))

        const ws   = wb.Sheets[sheetName]
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null })

        if (rows.length < 2) return

        // Zoek de headerrij (eerste rij met >2 gevulde cellen)
        let headerRowIdx = 0
        for (let i = 0; i < Math.min(10, rows.length); i++) {
          const filled = rows[i].filter(c => c !== null && c !== '').length
          if (filled > 2) { headerRowIdx = i; break }
        }

        const headers = rows[headerRowIdx].map(x => String(x || ''))
        const cols    = detectCols(headers)
        const dataRows = rows.slice(headerRowIdx + 1)

        dataRows.forEach(row => {
          if (!row || row.every(c => c === null || c === '')) return

          const royaltyVal = cols.royalty >= 0 ? parseFloat(row[cols.royalty]) : null
          if (isNaN(royaltyVal) && royaltyVal !== null) return // sla lege bedragen over

          const isrcVal      = cols.isrc  >= 0 ? String(row[cols.isrc]  || '').trim() || null : null
          const trackTitle   = cols.track >= 0 ? String(row[cols.track] || '').trim() || null : null
          const isrcKey      = isrcVal    ? isrcVal.toLowerCase()    : null
          const titleKey     = trackTitle ? trackTitle.toLowerCase() : null

          // Match: zoek release op CatalogNumber, dan track op titel binnen die release
          let track_id = null
          if (isrcKey && catalogMap[isrcKey]) {
            const entry = catalogMap[isrcKey]
            if (titleKey) {
              // Zoek exacte titel-match binnen de release
              const match = entry.tracks.find(t => t.titleLower === titleKey)
              if (match) track_id = match.id
            } else if (entry.tracks.length === 1) {
              // Enige track binnen deze release → direct koppelen
              track_id = entry.tracks[0].id
            }
          }

          const line = {
            label_name:  sheetName,
            artist_name: cols.artist   >= 0 ? String(row[cols.artist]   || '').trim() || null : null,
            track_title: trackTitle,
            isrc:        isrcVal,
            track_id,
            nett_royalty: royaltyVal || 0,
            period:      cols.period   >= 0 ? String(row[cols.period]   || '').trim() || null : null,
            usage_type:  cols.type     >= 0 ? String(row[cols.type]     || '').trim().toLowerCase() || null : null,
            quantity:    cols.quantity >= 0 ? (parseInt(row[cols.quantity]) || null) : null,
            raw_data:    Object.fromEntries(headers.map((h, i) => [h, row[i]])),
          }
          allLines.push(line)
          totalRoyalties += royaltyVal || 0
        })
      })

      setProgress(true, 'Klaar!', 100)

      // Preview tonen
      const labelCounts = {}
      allLines.forEach(l => { labelCounts[l.label_name] = (labelCounts[l.label_name] || 0) + 1 })

      const matchedLines = allLines.filter(l => l.track_id).length
      const noTitleLines = allLines.filter(l => l.isrc && !l.track_title)
      const noTitleCount = noTitleLines.length

      // ── Detecteer nieuw: releases, tracks, artiesten ──────────────
      const newReleasesSet = new Set()
      const newTracksSet   = new Set()
      const newArtistsSet  = new Set()

      allLines.forEach(l => {
        if (!l.isrc) return
        const catKey = l.isrc.toLowerCase()
        if (!catalogMap[catKey]) {
          newReleasesSet.add(l.isrc)
        } else {
          const titleKey = (l.track_title || '').toLowerCase()
          const exists   = catalogMap[catKey].tracks.some(t => t.titleLower === titleKey)
          if (!exists) newTracksSet.add(`${l.isrc} — ${l.track_title || '(geen naam)'}`)
        }
        if (l.artist_name && !knownArtists.has(l.artist_name)) {
          newArtistsSet.add(l.artist_name)
        }
      })

      const newBlock = (newReleasesSet.size || newTracksSet.size || newArtistsSet.size) ? `
        <div class="mt-3 p-3 rounded-lg border border-blue-500/30 bg-blue-500/5 text-xs space-y-2">
          <div class="text-blue-300 font-semibold mb-1">📥 Wordt automatisch toegevoegd bij upload:</div>
          ${newReleasesSet.size ? `<div class="text-blue-200">
            <span class="text-blue-400 font-medium">${newReleasesSet.size} nieuwe release(s):</span>
            <span class="text-gray-400 ml-1">${[...newReleasesSet].slice(0,8).join(', ')}${newReleasesSet.size > 8 ? ` +${newReleasesSet.size-8} meer` : ''}</span>
          </div>` : ''}
          ${newTracksSet.size ? `<div class="text-blue-200">
            <span class="text-blue-400 font-medium">${newTracksSet.size} nieuwe track(s):</span>
            <span class="text-gray-400 ml-1">${[...newTracksSet].slice(0,5).join(', ')}${newTracksSet.size > 5 ? ` +${newTracksSet.size-5} meer` : ''}</span>
          </div>` : ''}
          ${newArtistsSet.size ? `<div class="text-blue-200">
            <span class="text-blue-400 font-medium">${newArtistsSet.size} nieuwe artiest(en):</span>
            <span class="text-gray-400 ml-1">${[...newArtistsSet].slice(0,8).join(', ')}${newArtistsSet.size > 8 ? ` +${newArtistsSet.size-8} meer` : ''}</span>
          </div>` : ''}
        </div>` : `<div class="mt-2 text-xs text-green-400">✓ Geen nieuwe releases, tracks of artiesten gevonden.</div>`

      document.getElementById('previewContent').innerHTML = `
        <div class="font-medium text-white mb-2">${file.name}</div>
        <div class="text-gray-400 mb-1">
          ${sheetNames.length} labels · ${allLines.length} regels · Totaal: <span class="text-[#FFD100] font-semibold">${fmt(totalRoyalties)}</span>
        </div>
        <div class="text-xs mb-2 ${matchedLines > 0 ? 'text-green-400' : 'text-gray-600'}">
          ${matchedLines} van ${allLines.length} regels gekoppeld aan bekende tracks
        </div>
        ${noTitleCount > 0 ? `
        <div class="text-xs mb-2 text-amber-400">
          ⚠️ ${noTitleCount} regel(s) hebben een CatalogNumber maar geen tracknaam — worden opgeslagen zonder titel.
          <div class="mt-1 text-gray-500 max-h-20 overflow-y-auto">
            ${[...new Set(noTitleLines.map(l => l.isrc))].map(c => `<span class="inline-block mr-2">${c}</span>`).join('')}
          </div>
        </div>` : ''}
        ${newBlock}
        <div class="grid grid-cols-3 gap-1 max-h-40 overflow-y-auto mt-3">
          ${Object.entries(labelCounts).map(([name, cnt]) => `
            <div class="text-xs text-gray-500">${name} <span class="text-gray-600">(${cnt})</span></div>
          `).join('')}
        </div>
      `
      document.getElementById('parsePreview').classList.remove('hidden')
      document.getElementById('uploadBtn').disabled = false

      parsedData = { file, lines: allLines, total: totalRoyalties, sheetCount: sheetNames.length }

      setTimeout(() => setProgress(false), 1000)
    }

    // ---------- Opslaan ----------
    async function uploadStatement() {
      if (!parsedData) return
      const { file, lines, total } = parsedData
      const period = document.getElementById('period').value.trim() || null

      document.getElementById('uploadBtn').disabled = true
      setProgress(true, 'Opslaan...', 10)

      // Statement record aanmaken
      const { data: stmt, error: stmtErr } = await db
        .from('statements')
        .insert({ filename: file.name, period, total_royalties: total, line_count: lines.length })
        .select()
        .single()

      if (stmtErr) {
        showToast('Fout bij aanmaken statement: ' + stmtErr.message, 'error')
        document.getElementById('uploadBtn').disabled = false
        setProgress(false)
        return
      }

      // ── Auto-import: nieuwe releases, tracks, artiesten ─────────────
      setProgress(true, 'Nieuwe catalogus-items detecteren...', 15)

      // Verzamel unieke data uit de regels
      const newCatalogs = {}  // catalog_lower → { catalog, label_name, tracks: {title_lower → title}, artists: {title_lower → artist} }
      lines.forEach(l => {
        if (!l.isrc) return
        const key = l.isrc.toLowerCase()
        if (!newCatalogs[key]) newCatalogs[key] = { catalog: l.isrc, label_name: l.label_name, tracks: {}, artists: {} }
        const tk = (l.track_title || '').toLowerCase()
        if (!newCatalogs[key].tracks[tk]) newCatalogs[key].tracks[tk] = l.track_title || null
        if (l.artist_name) newCatalogs[key].artists[tk] = l.artist_name
      })

      // 1. Labels ophalen (naam → id)
      const labelsRes = await db.from('labels').select('id, name')
      const labelMap  = Object.fromEntries((labelsRes.data || []).map(l => [l.name, l.id]))

      // 2. Bestaande releases ophalen
      let existingReleases = [], from = 0
      while (true) {
        const { data } = await db.from('releases').select('id, catalog_number').range(from, from + 999)
        if (!data?.length) break
        existingReleases.push(...data)
        if (data.length < 1000) break
        from += 1000
      }
      const existingCatalogSet = new Set(existingReleases.map(r => r.catalog_number.toLowerCase()))
      const releaseMap = Object.fromEntries(existingReleases.map(r => [r.catalog_number.toLowerCase(), r.id]))

      // Nieuwe releases invoegen
      const newReleases = Object.values(newCatalogs)
        .filter(c => !existingCatalogSet.has(c.catalog.toLowerCase()))
        .map(c => ({
          catalog_number: c.catalog,
          label_id: labelMap[c.label_name] || null,
          release_type: Object.keys(c.tracks).length > 1 ? 'compilation' : 'single'
        }))
      if (newReleases.length) {
        setProgress(true, `${newReleases.length} nieuwe release(s) toevoegen...`, 20)
        const { data: inserted } = await db.from('releases').insert(newReleases).select('id, catalog_number')
        ;(inserted || []).forEach(r => { releaseMap[r.catalog_number.toLowerCase()] = r.id })
      }

      // 3. Bestaande tracks ophalen (release_id + title_lower → id)
      let existingTracks = []
      from = 0
      while (true) {
        const { data } = await db.from('tracks').select('id, title, release_id').range(from, from + 999)
        if (!data?.length) break
        existingTracks.push(...data)
        if (data.length < 1000) break
        from += 1000
      }
      const trackMap = {}  // release_id+title_lower → track_id
      existingTracks.forEach(t => { trackMap[`${t.release_id}|${(t.title||'').toLowerCase()}`] = t.id })

      // Nieuwe tracks invoegen
      const newTracks = []
      Object.values(newCatalogs).forEach(c => {
        const releaseId = releaseMap[c.catalog.toLowerCase()]
        if (!releaseId) return
        Object.entries(c.tracks).forEach(([titleLower, title]) => {
          if (!trackMap[`${releaseId}|${titleLower}`]) {
            newTracks.push({ release_id: releaseId, title: title || null })
          }
        })
      })
      if (newTracks.length) {
        setProgress(true, `${newTracks.length} nieuwe track(s) toevoegen...`, 30)
        for (let i = 0; i < newTracks.length; i += 100) {
          const { data: ins } = await db.from('tracks').insert(newTracks.slice(i, i+100)).select('id, title, release_id')
          ;(ins || []).forEach(t => { trackMap[`${t.release_id}|${(t.title||'').toLowerCase()}`] = t.id })
        }
      }

      // 4. Bestaande artiesten ophalen (naam → id)
      const artistsRes = await db.from('artists').select('id, name')
      const artistMap  = Object.fromEntries((artistsRes.data || []).map(a => [a.name, a.id]))

      // Nieuwe artiesten invoegen
      const newArtistNames = [...new Set(
        Object.values(newCatalogs).flatMap(c => Object.values(c.artists))
      )].filter(n => n && !artistMap[n])
      if (newArtistNames.length) {
        setProgress(true, `${newArtistNames.length} nieuwe artiest(en) toevoegen...`, 40)
        const { data: ins } = await db.from('artists').insert(newArtistNames.map(n => ({ name: n }))).select('id, name')
        ;(ins || []).forEach(a => { artistMap[a.name] = a.id })
      }

      // 5. Artiest-track koppelingen aanmaken (ontbrekende)
      const taRes = await db.from('track_artists').select('track_id')
      const linkedTrackIds = new Set((taRes.data || []).map(t => t.track_id))
      const newLinks = []
      Object.values(newCatalogs).forEach(c => {
        const releaseId = releaseMap[c.catalog.toLowerCase()]
        if (!releaseId) return
        Object.entries(c.artists).forEach(([titleLower, artistName]) => {
          const trackId   = trackMap[`${releaseId}|${titleLower}`]
          const artistId  = artistMap[artistName]
          if (trackId && artistId && !linkedTrackIds.has(trackId)) {
            newLinks.push({ track_id: trackId, artist_id: artistId, split_percentage: 100 })
            linkedTrackIds.add(trackId)
          }
        })
      })
      if (newLinks.length) {
        setProgress(true, `${newLinks.length} artiest-track koppeling(en) aanmaken...`, 50)
        for (let i = 0; i < newLinks.length; i += 100) {
          await db.from('track_artists').insert(newLinks.slice(i, i+100))
        }
      }

      // 6. catalogMap herbouwen zodat nieuwe tracks direct matchen
      await loadTrackMap()
      // Track_id opnieuw bepalen voor elke regel
      lines.forEach(l => {
        const isrcKey  = l.isrc ? l.isrc.toLowerCase() : null
        const titleKey = l.track_title ? l.track_title.toLowerCase() : null
        l.track_id = null
        if (isrcKey && catalogMap[isrcKey]) {
          const entry = catalogMap[isrcKey]
          if (titleKey) {
            const match = entry.tracks.find(t => t.titleLower === titleKey)
            if (match) l.track_id = match.id
          } else if (entry.tracks.length === 1) {
            l.track_id = entry.tracks[0].id
          }
        }
      })

      if (newReleases.length || newTracks.length || newArtistNames.length) {
        showToast(`Nieuw: ${newReleases.length} releases, ${newTracks.length} tracks, ${newArtistNames.length} artiesten toegevoegd.`)
      }

      // ── Regels in batches van 500 opslaan ───────────────────────────
      const batchSize = 500
      for (let i = 0; i < lines.length; i += batchSize) {
        const batch = lines.slice(i, i + batchSize).map(l => ({ ...l, statement_id: stmt.id }))
        const { error } = await db.from('statement_lines').insert(batch)
        if (error) {
          showToast('Fout bij opslaan regels: ' + error.message, 'error')
          setProgress(false)
          return
        }
        setProgress(true, `Regels opslaan ${Math.min(i + batchSize, lines.length)}/${lines.length}...`,
          10 + Math.round((i + batchSize) / lines.length * 85))
      }

      setProgress(true, 'Klaar!', 100)
      showToast(`${lines.length} regels opgeslagen!`)

      // Reset
      parsedData = null
      document.getElementById('fileInput').value = ''
      document.getElementById('period').value = ''
      document.getElementById('parsePreview').classList.add('hidden')
      document.getElementById('uploadBtn').disabled = true

      setTimeout(() => setProgress(false), 1000)
      await loadStatements()
    }

    function setProgress(show, label = '', pct = 0) {
      const el = document.getElementById('uploadProgress')
      if (!show) { el.classList.add('hidden'); return }
      el.classList.remove('hidden')
      document.getElementById('progressLabel').textContent = label
      document.getElementById('progressPct').textContent   = pct + '%'
      document.getElementById('progressBar').style.width   = pct + '%'
    }

    // ---------- Detail bekijken ----------
    async function viewDetail(stmtId, filename) {
      document.getElementById('detailTitle').textContent = filename
      document.getElementById('detailTable').innerHTML = '<tr><td colspan="5" class="px-4 py-4 text-gray-500">Laden...</td></tr>'
      document.getElementById('detailModal').classList.remove('hidden')

      const { data: lines } = await db
        .from('statement_lines')
        .select('label_name, artist_name, track_title, isrc, nett_royalty')
        .eq('statement_id', stmtId)
        .order('label_name')

      document.getElementById('detailTable').innerHTML = (lines || []).map(l => `
        <tr class="border-t border-[#2a2a2a] hover:bg-[#2a2a2a]/20">
          <td class="px-4 py-2 text-gray-400">${l.label_name || '—'}</td>
          <td class="px-4 py-2 text-white">${l.artist_name || '—'}</td>
          <td class="px-4 py-2 text-gray-300">${l.track_title || '—'}</td>
          <td class="px-4 py-2 text-gray-500">${l.isrc || '—'}</td>
          <td class="px-4 py-2 text-right text-[#FFD100] font-medium">${fmt(l.nett_royalty)}</td>
        </tr>
      `).join('')
    }

    function closeDetail() { document.getElementById('detailModal').classList.add('hidden') }

    document.getElementById('detailModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeDetail()
    })

    // ---------- Verwijderen ----------
    async function deleteStatement(id) {
      if (!confirm('Weet je zeker dat je dit statement (en alle regels) wilt verwijderen?')) return
      const { error } = await db.from('statements').delete().eq('id', id)
      if (error) {
        showToast('Fout: ' + error.message, 'error')
      } else {
        showToast('Statement verwijderd.')
        await loadStatements()
      }
    }

    loadPage()
  </script>
</body>
</html>
