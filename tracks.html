<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracks — Dutch Agency</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0d0d0d] text-white min-h-screen flex font-sans">

  <aside id="sidebar" class="w-52 bg-[#1e1e1e] border-r border-[#2a2a2a] fixed h-full z-10 top-0 left-0"></aside>

  <main class="flex-1 ml-52 p-8">

    <div class="flex items-center justify-between mb-5">
      <div>
        <h1 class="text-xl font-bold">Tracks</h1>
        <p class="text-gray-500 text-sm mt-0.5">Alle tracks in de catalogus</p>
      </div>
      <button onclick="openModal()"
        class="flex items-center gap-2 bg-[#E8920A] hover:bg-[#d4830a] text-white text-sm font-semibold px-4 py-2.5 rounded-lg transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Track toevoegen
      </button>
    </div>

    <!-- Zoek + filter -->
    <div class="flex gap-3 mb-5">
      <input type="text" id="searchInput" placeholder="Zoek op titel of ISRC..."
        class="bg-[#1e1e1e] border border-[#2a2a2a] text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-[#E8920A] transition-colors w-72 placeholder-gray-600"
        oninput="filterTable()">
      <select id="labelFilter"
        class="bg-[#1e1e1e] border border-[#2a2a2a] text-gray-400 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-[#E8920A] transition-colors"
        onchange="filterTable()">
        <option value="">Alle labels</option>
      </select>
    </div>

    <!-- Tabel -->
    <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-[#2a2a2a] text-gray-500 text-xs uppercase">
            <th class="text-left px-5 py-3 font-medium">Titel</th>
            <th class="text-left px-5 py-3 font-medium">Label</th>
            <th class="text-left px-5 py-3 font-medium">ISRC / Catalogus</th>
            <th class="text-right px-5 py-3 font-medium">Royalties</th>
            <th class="text-right px-5 py-3 font-medium">Acties</th>
          </tr>
        </thead>
        <tbody id="tracksTable">
          <tr><td colspan="5" class="px-5 py-6 text-gray-600 text-sm">Laden...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Paginering -->
    <div class="flex items-center justify-between mt-4 text-sm text-gray-500">
      <span id="pageInfo"></span>
      <div class="flex gap-2">
        <button id="prevBtn" onclick="prevPage()"
          class="px-3 py-1.5 bg-[#1e1e1e] border border-[#2a2a2a] rounded-lg hover:text-white transition-colors disabled:opacity-30">
          ← Vorige
        </button>
        <button id="nextBtn" onclick="nextPage()"
          class="px-3 py-1.5 bg-[#1e1e1e] border border-[#2a2a2a] rounded-lg hover:text-white transition-colors disabled:opacity-30">
          Volgende →
        </button>
      </div>
    </div>

  </main>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-2xl p-6 w-full max-w-md shadow-2xl">
      <h2 id="modalTitle" class="text-white font-semibold text-base mb-5">Track toevoegen</h2>
      <form id="trackForm" class="space-y-4">
        <input type="hidden" id="trackId">
        <div>
          <label class="block text-gray-400 text-xs mb-1.5 uppercase tracking-wider">Titel *</label>
          <input type="text" id="trackTitle" required
            class="w-full bg-[#0d0d0d] border border-[#2a2a2a] text-white rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-[#E8920A] transition-colors"
            placeholder="Track titel">
        </div>
        <div>
          <label class="block text-gray-400 text-xs mb-1.5 uppercase tracking-wider">Label</label>
          <select id="trackLabel"
            class="w-full bg-[#0d0d0d] border border-[#2a2a2a] text-white rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-[#E8920A] transition-colors">
            <option value="">— Geen label —</option>
          </select>
        </div>
        <div>
          <label class="block text-gray-400 text-xs mb-1.5 uppercase tracking-wider">ISRC / Catalogusnummer</label>
          <input type="text" id="trackIsrc"
            class="w-full bg-[#0d0d0d] border border-[#2a2a2a] text-white rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-[#E8920A] transition-colors"
            placeholder="bijv. NL-A51-24-00001">
        </div>
        <div class="flex gap-3 pt-1">
          <button type="button" onclick="closeModal()"
            class="flex-1 border border-[#2a2a2a] text-gray-400 hover:text-white rounded-lg py-3 text-sm transition-colors">
            Annuleren
          </button>
          <button type="submit"
            class="flex-1 bg-[#E8920A] hover:bg-[#d4830a] text-white font-semibold rounded-lg py-3 text-sm transition-colors">
            Opslaan
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    let allTracks = []
    let allLabels = []
    let royaltyByIsrc = {}
    let filtered = []
    let currentPage = 0
    const PAGE_SIZE = 50

    async function loadPage() {
      const session = await initPage('tracks')
      if (!session) return
      await Promise.all([loadLabels(), loadRoyalties()])
      await loadTracks()
    }

    async function loadLabels() {
      const { data } = await db.from('labels').select('id, name').order('name')
      allLabels = data || []

      const filterSel = document.getElementById('labelFilter')
      const modalSel  = document.getElementById('trackLabel')
      allLabels.forEach(l => {
        [filterSel, modalSel].forEach(sel => {
          const opt = document.createElement('option')
          opt.value = l.id
          opt.textContent = l.name
          sel.appendChild(opt)
        })
      })
    }

    async function loadRoyalties() {
      const { data: lines } = await db.from('statement_lines').select('isrc, nett_royalty, track_title')
      royaltyByIsrc = {}
      ;(lines || []).forEach(l => {
        const key = l.isrc || l.track_title
        if (!key) return
        royaltyByIsrc[key] = (royaltyByIsrc[key] || 0) + (parseFloat(l.nett_royalty) || 0)
      })
    }

    async function loadTracks() {
      const { data, error } = await db.from('tracks').select('*, labels(name)').order('title')
      allTracks = data || []
      filtered = allTracks
      currentPage = 0
      renderTable()
    }

    function renderTable() {
      const tbody = document.getElementById('tracksTable')
      const start = currentPage * PAGE_SIZE
      const page  = filtered.slice(start, start + PAGE_SIZE)

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="px-5 py-6 text-gray-600 text-sm">Geen tracks gevonden.</td></tr>'
        document.getElementById('pageInfo').textContent = ''
        return
      }

      tbody.innerHTML = page.map(t => {
        const labelName = t.labels?.name || '—'
        const royaltyKey = t.isrc || t.title
        const royalty = royaltyByIsrc[royaltyKey]
        return `
          <tr class="border-t border-[#2a2a2a] hover:bg-[#2a2a2a]/30 transition-colors">
            <td class="px-5 py-3 text-white font-medium">${t.title}</td>
            <td class="px-5 py-3 text-gray-500 text-xs">${labelName}</td>
            <td class="px-5 py-3 text-gray-500 text-xs font-mono">${t.isrc || '—'}</td>
            <td class="px-5 py-3 text-right ${royalty ? 'text-[#E8920A] font-semibold' : 'text-gray-600'}">
              ${royalty ? fmt(royalty) : '—'}
            </td>
            <td class="px-5 py-3 text-right">
              <button onclick='editTrack(${JSON.stringify(t)})' class="text-gray-500 hover:text-white text-xs mr-3 transition-colors">Bewerken</button>
              <button onclick="deleteTrack('${t.id}', '${t.title.replace(/'/g, "\\'")}')" class="text-gray-500 hover:text-red-400 text-xs transition-colors">Verwijderen</button>
            </td>
          </tr>
        `
      }).join('')

      const total = filtered.length
      const end   = Math.min(start + PAGE_SIZE, total)
      document.getElementById('pageInfo').textContent = `${start + 1}–${end} van ${total} tracks`
      document.getElementById('prevBtn').disabled = currentPage === 0
      document.getElementById('nextBtn').disabled = end >= total
    }

    function filterTable() {
      const q       = document.getElementById('searchInput').value.toLowerCase()
      const labelId = document.getElementById('labelFilter').value
      filtered = allTracks.filter(t => {
        const matchTitle = t.title.toLowerCase().includes(q) || (t.isrc || '').toLowerCase().includes(q)
        const matchLabel = !labelId || t.label_id === labelId
        return matchTitle && matchLabel
      })
      currentPage = 0
      renderTable()
    }

    function prevPage() { if (currentPage > 0) { currentPage--; renderTable() } }
    function nextPage() { if ((currentPage + 1) * PAGE_SIZE < filtered.length) { currentPage++; renderTable() } }

    function openModal(track = null) {
      document.getElementById('trackId').value    = track?.id || ''
      document.getElementById('trackTitle').value = track?.title || ''
      document.getElementById('trackLabel').value = track?.label_id || ''
      document.getElementById('trackIsrc').value  = track?.isrc || ''
      document.getElementById('modalTitle').textContent = track ? 'Track bewerken' : 'Track toevoegen'
      document.getElementById('modal').classList.remove('hidden')
      setTimeout(() => document.getElementById('trackTitle').focus(), 50)
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden') }
    function editTrack(t) { openModal(t) }

    document.getElementById('trackForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const id      = document.getElementById('trackId').value
      const payload = {
        title:    document.getElementById('trackTitle').value.trim(),
        label_id: document.getElementById('trackLabel').value || null,
        isrc:     document.getElementById('trackIsrc').value.trim() || null,
      }

      let error
      if (id) {
        ({ error } = await db.from('tracks').update(payload).eq('id', id))
      } else {
        ({ error } = await db.from('tracks').insert(payload))
      }

      if (error) {
        showToast(error.message || 'Er ging iets mis.', 'error')
      } else {
        showToast(id ? 'Track bijgewerkt.' : 'Track toegevoegd.')
        closeModal()
        await loadTracks()
      }
    })

    async function deleteTrack(id, title) {
      if (!confirm(`Weet je zeker dat je "${title}" wilt verwijderen?`)) return
      const { error } = await db.from('tracks').delete().eq('id', id)
      if (error) {
        showToast('Kan niet verwijderen: ' + error.message, 'error')
      } else {
        showToast('Track verwijderd.')
        await loadTracks()
      }
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal()
    })

    loadPage()
  </script>
</body>
</html>
